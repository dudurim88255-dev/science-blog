name: 새 논문 포스트 생성

on:
  workflow_dispatch:
    inputs:
      doi:
        description: '논문 DOI (예: 10.1038/s41586-026-xxxxx)'
        required: true
      category:
        description: '카테고리 (organoid / anti-aging / genomics / stem-cell / drug-discovery / neuroscience)'
        required: true
        default: 'organoid'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsx scripts/generate-post.ts "${{ inputs.doi }}" "${{ inputs.category }}"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: 포스트 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/
          git diff --staged --quiet || git commit -m "📄 새 논문 포스트: ${{ inputs.doi }}"
          git push
