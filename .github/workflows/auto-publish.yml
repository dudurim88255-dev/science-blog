name: 논문 자동 수집 & 발행

on:
  schedule:
    - cron: '0 0 * * 1,4'   # 매주 월요일·목요일 09:00 KST (UTC 00:00)
  workflow_dispatch:                 # 수동 실행 버튼

permissions:
  contents: write

jobs:
  auto-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 논문 자동 수집 & 포스트 생성
        run: npx tsx scripts/auto-collect.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SITE_URL: https://science-blog-dun.vercel.app

      - name: 변경사항 확인
        id: changes
        run: |
          git add content/
          git diff --staged --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 커밋 & 푸시
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: 자동 논문 포스트 $(date +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Vercel 배포
        if: steps.changes.outputs.changed == 'true'
        run: npx vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: team_ruRodWfalxM5k4QldqQgNq7d
          VERCEL_PROJECT_ID: prj_fqBOEI8pA0tAQnSXe8HMesY6EBLU
